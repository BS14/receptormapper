# Local development stack — uses real AWS DynamoDB + S3 (no local containers needed)
#
# Quick start:
#   docker compose up --build          # start API + frontend
#   docker compose up --build -d       # same, detached
#
# Run unit tests (fast, Vina mocked):
#   docker compose --profile test run --rm test
#
# Run full integration tests (real Vina, 1-5 min):
#   docker compose --profile test run --rm test \
#     python -m pytest tests/ -v -s
#
# Credentials are loaded from .env.local.example — copy it to .env to let
# Docker Compose pick it up automatically, or use the env_file directive below.

networks:
  rm-net:
    driver: bridge

services:

  # ── FastAPI prediction server ───────────────────────────────────────────────
  api:
    build:
      context: ./api
    image: receptormapper-api
    container_name: rm-api
    networks: [rm-net]
    ports:
      - "8080:8000"
    env_file:
      - .env.local.example
    # env_file sets AWS creds + DYNAMODB_TABLE. No AWS_ENDPOINT_URL → real AWS.

  # ── Next.js frontend ────────────────────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
    image: receptormapper-frontend
    container_name: rm-frontend
    networks: [rm-net]
    ports:
      - "3000:3000"
    depends_on:
      - api
    env_file:
      - .env.frontend.local.example
