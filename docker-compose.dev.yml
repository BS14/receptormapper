networks:
  rm-net:
    driver: bridge

services:

  # ── Local DynamoDB ──────────────────────────────────────────────────────────
  dynamo:
    image: amazon/dynamodb-local
    container_name: rm-dynamo
    networks: [rm-net]
    ports:
      - "8000:8000"
    command: ["-jar", "DynamoDBLocal.jar", "-sharedDb", "-inMemory"]
    healthcheck:
      test: ["CMD-SHELL", "timeout 1 bash -c 'cat < /dev/null > /dev/tcp/localhost/8000'"]
      interval: 3s
      timeout: 5s
      retries: 20
      start_period: 3s

  # ── FastAPI prediction server ───────────────────────────────────────────────
  api:
    build:
      context: ./api
    image: receptormapper-api
    container_name: rm-api
    networks: [rm-net]
    ports:
      - "8080:8000"
    depends_on:
      dynamo:
        condition: service_healthy
    env_file: .env.local

  # ── Next.js frontend ───────────────────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
    image: receptormapper-frontend
    container_name: rm-frontend
    networks: [rm-net]
    ports:
      - "3000:3000"
    depends_on:
      - api
    env_file: .env.local
