networks:
  rm-net:
    driver: bridge

services:

  # ── Local DynamoDB ──────────────────────────────────────────────────────────
  dynamo:
    image: amazon/dynamodb-local
    container_name: rm-dynamo
    networks: [rm-net]
    ports:
      - "8000:8000"
    command: ["-jar", "DynamoDBLocal.jar", "-sharedDb", "-inMemory"]
    healthcheck:
      test: ["CMD-SHELL", "timeout 1 bash -c 'cat < /dev/null > /dev/tcp/localhost/8000'"]
      interval: 3s
      timeout: 5s
      retries: 20
      start_period: 3s

  # ── FastAPI prediction server ───────────────────────────────────────────────
  api:
    build:
      context: ./api
    image: receptormapper-api
    container_name: rm-api
    networks: [rm-net]
    ports:
      - "8080:8000"
    depends_on:
      dynamo:
        condition: service_healthy
    environment:
      AWS_REGION: us-east-1
      AWS_ACCESS_KEY_ID: fake
      AWS_SECRET_ACCESS_KEY: fake
      AWS_ENDPOINT_URL: http://dynamo:8000
      DYNAMODB_CACHE_TABLE: prediction_cache
      DYNAMODB_JOBS_TABLE: prediction_jobs

  # ── Next.js frontend ───────────────────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
    image: receptormapper-frontend
    container_name: rm-frontend
    networks: [rm-net]
    ports:
      - "3000:3000"
    depends_on:
      - api
    environment:
      AWS_REGION: us-east-1
      AWS_ACCESS_KEY_ID: fake
      AWS_SECRET_ACCESS_KEY: fake
      AWS_ENDPOINT_URL: http://dynamo:8000
      DYNAMODB_JOBS_TABLE: prediction_jobs
      DYNAMODB_CACHE_TABLE: prediction_cache
      FASTAPI_URL: http://api:8000
      NEXTAUTH_URL: http://localhost:3000
      NEXTAUTH_SECRET: dev-secret-change-in-prod
