# Production API stack — FastAPI
# Uses real AWS DynamoDB + S3 via EC2 instance IAM role (no credentials needed)
# Frontend deployed separately on Vercel
#
# Required env vars (in .env, auto-loaded by compose):
#   AWS_REGION
#   DYNAMODB_TABLE   (default: receptormapper_jobs)
#   S3_BUCKET        (default: receptormapper-docked-structures)

networks:
  rm-prod-net:
    driver: bridge

services:

  api:
    build:
      context: ./api
    image: receptormapper-api
    container_name: rm-api
    restart: unless-stopped
    networks: [rm-prod-net]
    ports:
      - "127.0.0.1:8000:8000"
    env_file:
      - .env
    environment:
      AWS_REGION: ${AWS_REGION}
      DYNAMODB_TABLE: ${DYNAMODB_TABLE:-receptormapper_jobs}
      S3_BUCKET: ${S3_BUCKET:-receptormapper-docked-structures}
