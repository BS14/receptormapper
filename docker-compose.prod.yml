# Production API stack — FastAPI + Nginx
# Uses real AWS DynamoDB via EC2 instance IAM role (no credentials needed)
# Frontend is deployed separately on Vercel
#
# Required env vars (set in .env.prod or export before running):
#   AWS_REGION
#   DYNAMODB_JOBS_TABLE   (default: prediction_jobs)
#   DYNAMODB_CACHE_TABLE  (default: prediction_cache)
#
# SSL certs must be placed at:
#   nginx/ssl/cert.pem
#   nginx/ssl/key.pem

networks:
  rm-prod-net:
    driver: bridge

services:

  api:
    build:
      context: ./api
    image: receptormapper-api
    container_name: rm-api
    restart: unless-stopped
    networks: [rm-prod-net]
    ports:
      - "127.0.0.1:8000:8000"
    env_file:
      - .env
    environment:
      AWS_REGION: ${AWS_REGION}
      DYNAMODB_JOBS_TABLE: ${DYNAMODB_JOBS_TABLE:-prediction_jobs}
      DYNAMODB_CACHE_TABLE: ${DYNAMODB_CACHE_TABLE:-prediction_cache}
